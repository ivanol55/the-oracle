services:
  embedding_database:
    image: ghcr.io/chroma-core/chroma:0.6.3
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - ./data/chroma/chroma:/chroma/chroma/
    ports:
      - 8000:8000
  data_sync:
    image: oracle_backend
    build:
      context: backend
      dockerfile: Dockerfile
    command: ["python", "-m", "the_oracle.sync"]
    environment:
      - CHROMA_HOST=embedding_database
      - CHROMA_PORT=8000
      - SYNC_SOURCE=json
      - SYNC_INTERVAL_SECONDS=300
    volumes:
      - ./data/knowledge/:/data/knowledge/
    depends_on:
      - embedding_database
  api_backend:
    image: oracle_backend
    environment:
      - CHROMA_HOST=embedding_database
      - CHROMA_PORT=8000
      - CONFIDENCE_THRESHOLD=30
    ports:
      - 8080:8080
    depends_on:
      - embedding_database
  app_frontend:
    image: oracle_frontend
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
