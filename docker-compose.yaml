version: '3'
services:
  embedding_database:
    image: ghcr.io/chroma-core/chroma:0.6.3
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - ./data/chroma/chroma:/chroma/chroma/
    ports:
      - 8000:8000
  api_backend:
    image: oracle_backend
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      - POPULATE_CHROMA=False # Set to 'True' to force-recycle the collection from the data file
      - CHROMA_HOST=embedding_database
      - CHROMA_PORT=8000
      - UVICORN_PORT=8080
      - KNOWLEDGE_DATA_FILE=/data/knowledge/data.json
    volumes:
      - ./data/knowledge/:/data/knowledge/
      - ./data/backend/chroma_cache:/root/.cache/chroma/
    ports:
      - 8080:8080
  app_frontend:
    image: oracle_frontend
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
